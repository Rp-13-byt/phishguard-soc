services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishguard_password}
      POSTGRES_DB: ${POSTGRES_DB:-phishguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishguard} -d ${POSTGRES_DB:-phishguard}"]
      interval: 5s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://phishguard:phishguard_password@postgres:5432/phishguard}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      REPORT_DIR: /app/generated_reports
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_reports:/app/generated_reports

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  backend_reports:
